server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ai-knowledge-base
  datasource:
    url: ${APP_DATASOURCE_URL:jdbc:mysql://localhost:3307/ai_knowledge_base?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${APP_DATASOURCE_USERNAME:root}
    password: ${APP_DATASOURCE_PASSWORD:root123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  data:
    redis:
      host: ${APP_REDIS_HOST:localhost}
      port: ${APP_REDIS_PORT:6380}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

app:
  security:
    jwt-secret: ${APP_JWT_SECRET:ai-knowledge-base-stage-one-development-secret-please-change}
    jwt-expiration-minutes: ${APP_JWT_EXPIRATION_MINUTES:120}
  ai:
    provider: ${APP_AI_PROVIDER:mock}
    base-url: ${APP_AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${APP_AI_API_KEY:}
    model: ${APP_AI_MODEL:gpt-4o-mini}
  storage:
    attachments-dir: ${APP_ATTACHMENTS_DIR:uploads/attachments}
